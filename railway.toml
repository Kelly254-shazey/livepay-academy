[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[env]
# Railway automatically assigns PORT for web services
# Default to Node.js service
SERVICE_TYPE = "nodejs"

# Node.js Environment
NODE_ENV = "production"

# Database Configuration (set in Railway dashboard)
# DATABASE_URL = "mysql://user:password@host:3306/livegate"
# REDIS_URL = "redis://host:port"

[deploy]
numReplicas = 1
restartPolicy = "on-failure"
restartPolicyMaxRetries = 5
