server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/livegate_java?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:livegate}
    password: ${SPRING_DATASOURCE_PASSWORD:livegate}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      show-details: always

livegate:
  internal-api-key: ${INTERNAL_API_KEY:livegate-internal-key}
  platform-commission-rate: ${PLATFORM_COMMISSION_RATE:0.20}
  creator-share-rate: ${CREATOR_SHARE_RATE:0.80}
  payout-hold-days: ${PAYOUT_HOLD_DAYS:7}
