server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-354d45d7-kelly123simiyu-a329.e.aivencloud.com:24928/livegate_java?sslMode=REQUIRED&enabledTLSProtocols=TLSv1.2,TLSv1.3&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:avnadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      # Never expose DB/pool details publicly — use 'when-authorized' for internal monitoring
      show-details: when-authorized
      show-components: when-authorized

livegate:
  # INTERNAL_API_KEY must be set via environment variable — no default allowed in production
  internal-api-key: ${INTERNAL_API_KEY}
  platform-commission-rate: ${PLATFORM_COMMISSION_RATE:0.20}
  creator-share-rate: ${CREATOR_SHARE_RATE:0.80}
  payout-hold-days: ${PAYOUT_HOLD_DAYS:7}
