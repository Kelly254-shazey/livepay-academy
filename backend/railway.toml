[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[env]
# Railway automatically assigns PORT for the public web service.
SERVICE_TYPE = "all"

NODE_ENV = "production"
SERVER_PORT = "8080"
PYTHON_SERVICE_PORT = "8000"
# Service URLs must be set in Railway dashboard Variables
# JAVA_FINANCE_URL: defaults to http://127.0.0.1:8080 if not set (for single-container deployments)
# PYTHON_INTELLIGENCE_URL: defaults to http://127.0.0.1:8000 if not set (for single-container deployments)

# Database Configuration (set in Railway dashboard)
# DATABASE_URL = "mysql://user:password@host:3306/livegate"
# PYTHON_DATABASE_URL = "mysql+aiomysql://user:password@host:3306/livegate_python"
# PYTHON_SOURCE_DATABASE_URL = "mysql+aiomysql://user:password@host:3306/livegate_nodejs"
# REDIS_URL = "redis://host:port"

[deploy]
numReplicas = 1
restartPolicy = "on-failure"
restartPolicyMaxRetries = 5
